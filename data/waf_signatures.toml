# WAF Signature Definitions
#
# Each [[signatures]] entry defines one WAF product with its detection
# indicators and recommended evasion encodings.
#
# Adding a new WAF:
#   1. Append a [[signatures]] block with a unique `id`.
#   2. List detection indicators — each has a `check`, `weight`, and `description`.
#   3. Set `evasion` to the encoding names that tend to bypass this WAF.
#   4. No Rust code changes required.
#
# Check types:
#   header_exists       — header with `value` name is present
#   header_any_exists   — any of `values` headers are present
#   header_contains     — header `name` contains substring `value`
#   body_contains       — response body contains `value`
#   body_any            — body contains any of `values`
#   cookie_exists       — cookie with exact `value` name is present
#   cookie_any          — any of `values` cookie names are present
#   cookie_prefix       — any cookie name starts with `value`
#   cookie_contains     — any cookie name contains `value`
#   any_header_contains — any header name or value contains `value`
#   status_in           — HTTP status code is in `values`
#   all_of              — all sub-`checks` must pass (AND)
#   any_of              — any sub-`checks` may pass (OR)

# ─── Cloudflare ──────────────────────────────────────────────────────

[[signatures]]
id = "cloudflare"
name = "Cloudflare"
evasion = ["UrlEncode", "UnicodeEncode"]

[[signatures.indicators]]
weight = 0.45
description = "cf-ray header"
check = { type = "header_exists", value = "cf-ray" }

[[signatures.indicators]]
weight = 0.30
description = "cloudflare cookie"
check = { type = "cookie_any", values = ["__cfduid", "cf_clearance"] }

[[signatures.indicators]]
weight = 0.35
description = "cloudflare challenge body"
check = { type = "body_any", values = ["attention required", "cloudflare ray id"] }

[[signatures.indicators]]
weight = 0.25
description = "cf-cache-status header"
check = { type = "header_exists", value = "cf-cache-status" }

[[signatures.indicators]]
weight = 0.25
description = "server: cloudflare"
check = { type = "header_contains", name = "server", value = "cloudflare" }

[[signatures.indicators]]
weight = 0.25
description = "cloudflare error code body"
check = { type = "body_any", values = ["error 1020", "error 1015"] }

# ─── AWS WAF ─────────────────────────────────────────────────────────

[[signatures]]
id = "aws_waf"
name = "AWS WAF"
evasion = ["DoubleUrlEncode", "UnicodeEncode"]

[[signatures.indicators]]
weight = 0.35
description = "x-amzn-requestid header"
check = { type = "header_exists", value = "x-amzn-requestid" }

[[signatures.indicators]]
weight = 0.45
description = "403 request blocked body"
[signatures.indicators.check]
type = "all_of"
checks = [
  { type = "status_in", values = [403] },
  { type = "body_contains", value = "request blocked" },
]

[[signatures.indicators]]
weight = 0.30
description = "aws waf error marker"
[signatures.indicators.check]
type = "any_of"
checks = [
  { type = "header_contains", name = "x-amzn-errortype", value = "waf" },
  { type = "body_contains", value = "aws waf" },
]

[[signatures.indicators]]
weight = 0.25
description = "x-amzn-trace-id header"
check = { type = "header_exists", value = "x-amzn-trace-id" }

[[signatures.indicators]]
weight = 0.20
description = "x-amz-cf-id header"
check = { type = "header_exists", value = "x-amz-cf-id" }

